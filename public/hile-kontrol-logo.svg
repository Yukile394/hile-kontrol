<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M100 22 L158 46 L158 98 C158 132 132 158 100 172 C68 158 42 132 42 98 L42 46 Z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="rgba(0,200,255,0.15)" stroke-width="1.5"/>

  <!-- Outer ring dots -->
  <circle cx="100" cy="8" r="2.5" fill="rgba(0,200,255,0.5)"/>
  <circle cx="100" cy="192" r="2.5" fill="rgba(0,200,255,0.5)"/>
  <circle cx="8" cy="100" r="2.5" fill="rgba(0,200,255,0.5)"/>
  <circle cx="192" cy="100" r="2.5" fill="rgba(0,200,255,0.5)"/>
  <circle cx="29" cy="29" r="2" fill="rgba(0,200,255,0.3)"/>
  <circle cx="171" cy="29" r="2" fill="rgba(0,200,255,0.3)"/>
  <circle cx="29" cy="171" r="2" fill="rgba(0,200,255,0.3)"/>
  <circle cx="171" cy="171" r="2" fill="rgba(0,200,255,0.3)"/>

  <!-- Shield shadow/glow -->
  <path d="M100 26 L154 49 L154 98 C154 130 130 155 100 168 C70 155 46 130 46 98 L46 49 Z"
        fill="rgba(0,200,255,0.08)" filter="url(#softGlow)"/>

  <!-- Shield body -->
  <path d="M100 22 L158 46 L158 98 C158 132 132 158 100 172 C68 158 42 132 42 98 L42 46 Z"
        fill="url(#shieldGrad)" opacity="0.12"/>

  <!-- Shield border -->
  <path d="M100 22 L158 46 L158 98 C158 132 132 158 100 172 C68 158 42 132 42 98 L42 46 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Shield inner border -->
  <path d="M100 30 L150 51 L150 98 C150 127 127 151 100 163 C73 151 50 127 50 98 L50 51 Z"
        fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="1"/>

  <!-- Shield top glow fill -->
  <path d="M100 22 L158 46 L158 70 Q128 60 100 58 Q72 60 42 70 L42 46 Z"
        fill="url(#glowGrad)" clip-path="url(#shieldClip)"/>

  <!-- Checkmark / scan lines inside shield -->
  <line x1="65" y1="98" x2="90" y2="123" stroke="url(#shieldGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="90" y1="123" x2="138" y2="72" stroke="url(#shieldGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Scan line accent -->
  <line x1="55" y1="108" x2="145" y2="108" stroke="rgba(0,200,255,0.12)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Bottom text: HİLE KONTROL -->
  <text x="100" y="186" text-anchor="middle"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="10" font-weight="700"
        letter-spacing="3"
        fill="rgba(0,200,255,0.7)">HİLE KONTROL</text>
</svg>
